PPT_DATA_DIR: "DATA"
PPT_DL_DIR: "Téléchargements"
PPT_LOGLEVEL_CONSOLE: WARNING
PPT_LOGLEVEL_LOGFILE: INFO

POMOFOCUS_FILENAME: "pomofocus.csv"
SUPERPROD_FILENAME: "super_productivity.json"
WEBPROD_FILENAME: "web_productivity.json"
PARQUET_FILENAME: "histories.parquet"
ODS_FILENAME: "suivi_chantiers.ods"

# Webhook-captured Pomofocus CSV (downloaded by `timer web_sync`, read by
# `timer report --input web`). Lives in its own dir, separate from DATA/.
WEBHOOK_DATA_DIR: "webhook-data"
WEBHOOK_POMOFOCUS_FILENAME: "pomofocus_webhook.csv"
WEBHOOK_CSV_URL: "http://timer.co-libri.org/api/csv"

EXPORT_PROJECTS:
- "colibri"
- "speasy"
- "calipso"

# Comparé au préfixe du projet (avant le premier « _ »), cf. _row_is_billable.
# Les projets d'avant le webhook viennent de l'archive CAE : leur caractère
# facturable est établi par la colonne `projet_facturé` de « facturation
# projets.ods » (bht facturé sous bht2/uws, heliopropa sous planmotion/uws, iut
# sous iut ; sapie, infra, colibri et perso ne l'étaient pas).
BILLABLE_PROJECTS:
- "speasy"
- "calipso"
- "calipso_a"
- "calipso_b"
- "bht"
- "heliopropa"
- "iut"
